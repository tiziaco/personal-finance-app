[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async configuration — all fixtures AND tests share one session-scoped loop
# so the DB connection pool created in session fixtures is reusable in tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Markers
markers =
    unit: Unit tests that don't require database or external services
    integration: Integration tests that use database or external services
    slow: Slow tests that make external API calls
    asyncio: Async tests using pytest-asyncio

# Logging
log_cli = false
log_cli_level = INFO

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
