services:
  web-app:
    container_name: web-app
    build:
      context: ./web-app
      dockerfile: Dockerfile
    env_file:
    - .env.local
    restart: always
    volumes:
      - static-files:/app/.next/static
    ports:
      - 3000:3000
    networks:
      - tmp_network

  
volumes:
  static-files:

networks:
  tmp_network:
    driver: bridge
